events { worker_connections 1024; }
http {
  upstream frontend { server frontend:80; }
  upstream graphql   { server graphql:4000; }
  server {
    listen 8080; server_name _;
    location /graphql { proxy_pass http://graphql; proxy_set_header Host $host; }
    location /api/    { proxy_pass http://graphql; }
    location /        { proxy_pass http://frontend; proxy_set_header Host $host; }
  }
}
